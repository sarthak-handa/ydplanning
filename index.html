<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOGIJI DIGI | Project Operating System</title>
  
  <link href="yd-favicon.png" rel="icon" />
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- AG Grid -->
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.noStyle.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="app-header">
    <div class="logo-container">
      <img src="YDLOGO.png" alt="YOGIJI DIGI Logo">
      <div class="logo-text">PROJECT OPERATING SYSTEM</div>
    </div>
    <div class="user-profile">
      <span class="badge badge-primary"><i class="fas fa-user-circle"></i> ADMIN PANEL</span>
    </div>
  </header>

  <div class="main-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header" style="padding: 20px; border-bottom: 1px solid var(--glass-border);">
        <button class="btn-premium btn-primary w-100" id="btn-projects-nav" onclick="showProjects()">
          <i class="fas fa-th-large"></i> DASHBOARD
        </button>
      </div>
      
      <div id="tree-container" style="flex: 1; overflow-y: auto; padding-top: 15px; display: none;">
        <div class="nav-section-title" style="padding: 0 20px 10px; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase;">Structure (WBS)</div>
        <div id="assembly-tree" class="tree">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid var(--glass-border);">
        <div class="status-indicator">
          <span id="save-status" class="status-text" style="font-size: 12px; font-weight: 500; color: var(--primary);"></span>
        </div>
      </div>
    </aside>

    <main class="content-area">
      <!-- PROJECTS SCREEN -->
      <section id="screen-projects" class="animate-fade">
        <div class="d-flex justify-content-between align-items-center mb-4" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
          <h2 style="margin: 0; color: var(--primary); font-weight: 700;">Projects Workspace</h2>
          <button class="btn-premium btn-primary" onclick="createProject()">
            <i class="fas fa-plus"></i> NEW PROJECT
          </button>
        </div>
        
        <div class="glass-card">
          <table class="premium-table">
            <thead>
              <tr>
                <th>Project Details</th>
                <th>Division</th>
                <th>Manager</th>
                <th>Plan Status</th>
                <th>Labels</th>
                <th>State</th>
                <th>Timeline</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="projects-tbody">
              <!-- Filled by JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- WORKSPACE SCREEN -->
      <section id="screen-workspace" style="display: none;" class="animate-fade">
        <div class="workspace-header mb-4" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px;">
          <div class="d-flex align-items-center gap-3" style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-premium" onclick="showProjects()" style="background: white; border: 1px solid #ddd;">
              <i class="fas fa-arrow-left"></i> BACK
            </button>
            <h3 id="workspace-title" style="margin: 0; color: var(--primary); font-weight: 700;">Project Workspace</h3>
          </div>
          
          <div class="actions-group" style="display: flex; gap: 10px;">
            <button class="btn-premium btn-primary" onclick="document.getElementById('upload-planning').click()">
              <i class="fas fa-file-upload"></i> UPLOAD WBS
            </button>
            <input type="file" id="upload-planning" accept=".xlsx, .xls" style="display:none;" onchange="handlePlanningUpload(event)">
            
            <button class="btn-premium" style="background: #20c997; color: white;" onclick="createEmptyBom()">
              <i class="fas fa-plus-square"></i> NEW BOM
            </button>
            
            <button class="btn-premium" style="background: #0dcaf0; color: white;" onclick="document.getElementById('upload-excel').click()">
              <i class="fas fa-file-excel"></i> IMPORT BOM
            </button>
            <input type="file" id="upload-excel" accept=".xlsx, .xls" style="display:none;" onchange="handleUpload(event)">
            
            <button class="btn-premium" style="background: white; border: 1px solid #ddd;" onclick="downloadExcel()">
              <i class="fas fa-download"></i> EXPORT
            </button>
          </div>
        </div>

        <div class="glass-card" style="padding: 0; overflow: hidden; height: 65vh; display: flex; flex-direction: column;">
          <div id="bom-title-bar" style="padding: 15px 20px; background: white; border-bottom: 1px solid #eee; font-weight: 600; color: var(--primary);">
            <i class="fas fa-table me-2"></i> <span id="bom-title">BOM View - Select an Assembly</span>
          </div>
          <div id="myGrid" class="ag-theme-alpine" style="flex: 1;"></div>
        </div>
      </section>
    </main>
  </div>

  <footer class="app-footer">
    <img src="yd-footer.png" alt="Footer Branding">
  </footer>

  <script>
    // --- Configuration ---
    const SUPABASE_URL = "https://vidoqysothqtrgvkzouh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpZG9xeXNvdGhxdHJndmt6b3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MjEwMTksImV4cCI6MjA5MzA5NzAxOX0.-WSt4v067PAUqc3Z99wESocy5KExO5-mLg6DafjDD8s";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Current Context
    let ctx = {
      projectId: '',
      taskId: '',
      assemblyId: ''
    };

    // Exact column headers from Excel
    const EXCEL_COLS = [
      "Sr No", "Joblist", "Dwng No", "Quantity", "Material", "Wt", 
      "Assembly Name", "Vendor Name", "PO Number", "Unit Price", "Total Price", 
      "Release PO Status", "Release PO Date", "Ready Assembly Status", "Ready Assembly Date"
    ];

    // AG Grid Setup
    let gridApi;

    const columnDefs = EXCEL_COLS.map(colName => {
      return {
        headerName: colName,
        field: colName,
        editable: true,
        width: 150,
        cellStyle: params => {
          const val = (params.value || '').toString().trim().toLowerCase();
          if (val === 'ns' || val === 'not started' || val === 'hold') return { backgroundColor: '#f8d7da', color: '#842029' };
          if (val === 'ip' || val === 'in progress' || val === 'wip') return { backgroundColor: '#cff4fc', color: '#055160' };
          if (val === 'co' || val === 'complete' || val === 'completed' || val === 'done') return { backgroundColor: '#d1e7dd', color: '#0f5132' };
          return null;
        }
      };
    });

    const gridOptions = {
      columnDefs: columnDefs,
      defaultColDef: {
        resizable: true,
        sortable: true,
        filter: true
      },
      rowData: [],
      onCellValueChanged: (event) => saveRowDebounced(event.data),
      stopEditingWhenCellsLoseFocus: true,
      enableRangeSelection: true 
    };

    // Initialize Grid
    document.addEventListener("DOMContentLoaded", () => {
      const gridDiv = document.querySelector('#myGrid');
      gridApi = agGrid.createGrid(gridDiv, gridOptions);
      
      // Load initial Data
      ctx.projectId = localStorage.getItem("projectId") || '';
      if (ctx.projectId) {
        showWorkspace(ctx.projectId);
      } else {
        loadProjects();
      }
    });

    function showProjects() {
      document.getElementById('screen-workspace').style.display = 'none';
      document.getElementById('screen-projects').style.display = 'block';
      document.getElementById('tree-container').style.display = 'none';
      document.getElementById('btn-projects-nav').classList.add('active');
      localStorage.removeItem("projectId");
      loadProjects();
    }

    function showWorkspace(projectId) {
      document.getElementById('screen-projects').style.display = 'none';
      document.getElementById('screen-workspace').style.display = 'block';
      document.getElementById('tree-container').style.display = 'block';
      document.getElementById('btn-projects-nav').classList.remove('active');
      
      ctx.projectId = projectId;
      localStorage.setItem("projectId", projectId);
      
      loadTree(projectId);
      updateWorkspaceTitle(projectId);
    }

    async function updateWorkspaceTitle(projectId) {
      const { data } = await sb.from('projects').select('name').eq('id', projectId).single();
      if (data) {
        document.getElementById('workspace-title').innerText = `${projectId} | ${data.name}`;
      }
    }

    async function loadTree(projectId) {
      const treeContainer = document.getElementById('assembly-tree');
      treeContainer.innerHTML = '<div style="padding:20px; color:#999; font-size:12px;"><i class="fas fa-spinner fa-spin me-2"></i>Loading WBS...</div>';
      
      const { data, error } = await sb.from('assemblies')
        .select('*')
        .eq('project_id', projectId)
        .order('sort_order', { ascending: true });
        
      if (error || !data || data.length === 0) {
        treeContainer.innerHTML = '<div style="padding:20px; color:#999; font-size:12px;">No hierarchy found.</div>';
        return;
      }

      let html = '';
      let currentCat = null;
      let currentPhase = null;

      data.forEach(a => {
        const type = (a.type || '').toUpperCase();
        
        if (a.category && a.category !== currentCat) {
          html += `<div class="nav-section-title" style="padding: 15px 20px 5px; font-size: 10px; color: var(--secondary); opacity: 0.8; font-weight: 700;">CAT: ${a.category}</div>`;
          currentCat = a.category;
          currentPhase = null;
        }

        if (type === 'TASK' || (a.phase && a.phase !== currentPhase)) {
           const phaseName = a.phase || 'General Phase';
           if (phaseName !== currentPhase) {
             html += `<div style="padding: 8px 20px; font-weight: 600; font-size: 12px; color: var(--primary);"><i class="fas fa-layer-group me-2"></i>${phaseName}</div>`;
             currentPhase = phaseName;
           }
        }

        if (type === 'SUBTASK' || type === 'STEP') {
          const icon = type === 'SUBTASK' ? 'fa-project-diagram' : 'fa-cog';
          html += `
            <div class="tree-node ${ctx.assemblyId === a.internal_id ? 'active' : ''}" 
                 style="margin-left: 15px;"
                 onclick="selectAssembly('${projectId}','${a.task_id}','${a.internal_id}','${a.name.replace(/'/g, "\\'")}', this)">
              <i class="fas ${icon}" style="width: 16px; font-size: 12px;"></i>
              <span class="text-truncate" style="font-size: 13px;">${a.name}</span>
            </div>
          `;
        }
      });

      treeContainer.innerHTML = html;
    }

    async function loadProjects() {
      const { data, error } = await sb.from('projects').select('*').order('created_at', { ascending: false });
      if (error) return console.error(error);
      renderProjects(data || []);
    }

    function renderProjects(projects) {
      const tbody = document.getElementById('projects-tbody');
      let html = '';
      
      projects.forEach(p => {
        const planClass = (p.plan_status || '').toLowerCase().includes('checked') ? 'badge-success' : 'badge-primary';
        const stateClass = (p.state || '').toLowerCase().includes('process') ? 'badge-warning' : 'badge-primary';
        
        html += `
          <tr onclick="showWorkspace('${p.id}')">
            <td>
              <div style="font-weight: 700; color: var(--primary);">${p.project_code || p.id}</div>
              <div style="font-size: 12px; color: #666;">${p.name || ''}</div>
            </td>
            <td>${p.division || 'DEFAULT'}</td>
            <td>
              <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 28px; height: 28px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--primary);">
                  ${(p.manager || '??').split(' ').map(n=>n[0]).join('')}
                </div>
                ${p.manager || ''}
              </div>
            </td>
            <td><span class="badge ${planClass}">${p.plan_status || ''}</span></td>
            <td><span class="badge badge-primary">${p.labels || ''}</span></td>
            <td><span class="badge ${stateClass}">${p.state || ''}</span></td>
            <td style="font-size: 12px; color: #666;">
              <div><i class="fas fa-calendar-alt me-1"></i> ${p.start_date || ''}</div>
              <div><i class="fas fa-flag-checkered me-1"></i> ${p.due_date || ''}</div>
            </td>
            <td><i class="fas fa-ellipsis-v" style="color: #ccc;"></i></td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    function selectAssembly(projectId, taskId, assemblyId, name, element) {
      document.querySelectorAll('.tree-node').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      document.getElementById('bom-title').innerText = `BOM View - ${name}`;
      
      ctx.projectId = projectId;
      ctx.taskId = taskId;
      ctx.assemblyId = assemblyId;

      loadBomData();
    }

    function showStatus(text, duration = 3000) {
      const el = document.getElementById('save-status');
      el.innerText = text;
      if (duration) {
        setTimeout(() => { if (el.innerText === text) el.innerText = ''; }, duration);
      }
    }

    async function loadBomData() {
      showStatus("Loading...");
      gridApi.setGridOption('rowData', []);
      
      const { data, error } = await sb
        .from('bom_items')
        .select('*')
        .eq('project_id', ctx.projectId)
        .eq('assembly_task_id', ctx.taskId)
        .order('excel_row_index', { ascending: true });

      if (error) {
        showStatus("Load Error", 5000);
        return;
      }

      const rowData = data.map(dbRow => {
        const gridRow = { _db_id: dbRow.id, _excel_row_index: dbRow.excel_row_index };
        EXCEL_COLS.forEach(colName => gridRow[colName] = dbRow[colName] || "");
        return gridRow;
      });

      gridApi.setGridOption('rowData', rowData);
      showStatus("Loaded", 2000);
    }

    let saveTimeout;
    function saveRowDebounced(row) {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => saveRow(row), 500);
    }

    async function saveRow(gridRow) {
      showStatus("Saving...");
      const dbRecord = {
        project_id: ctx.projectId,
        assembly_task_id: ctx.taskId,
        assembly_id: ctx.assemblyId,
        excel_row_index: gridRow._excel_row_index || 1
      };
      if (gridRow._db_id) dbRecord.id = gridRow._db_id;
      EXCEL_COLS.forEach(colName => dbRecord[colName] = gridRow[colName] || null);

      const { data, error } = await sb.from('bom_items').upsert([dbRecord]).select();
      if (error) {
        showStatus("Save Failed", 5000);
      } else {
        if (!gridRow._db_id && data && data.length > 0) gridRow._db_id = data[0].id;
        showStatus("Saved ✓");
      }
    }

    function createEmptyBom() {
      if (!confirm("Create empty BOM?")) return;
      const rows = [];
      for (let i = 1; i <= 25; i++) {
        const r = { _excel_row_index: i };
        EXCEL_COLS.forEach(c => r[c] = "");
        r["Sr No"] = i;
        rows.push(r);
      }
      gridApi.setGridOption('rowData', rows);
    }

    function downloadExcel() {
      const data = gridOptions.rowData;
      if (!data || data.length === 0) return alert("No data to export");
      const worksheet = XLSX.utils.json_to_sheet(data.map(r => {
        const exportRow = {};
        EXCEL_COLS.forEach(col => exportRow[col] = r[col]);
        return exportRow;
      }));
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "BOM");
      XLSX.writeFile(workbook, `BOM_${ctx.assemblyId || 'export'}.xlsx`);
    }

    function handleUpload(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);
        
        const gridRows = rows.map((r, idx) => {
          const gridRow = { _excel_row_index: idx + 1 };
          EXCEL_COLS.forEach(col => gridRow[col] = r[col] || "");
          return gridRow;
        });
        gridApi.setGridOption('rowData', gridRows);
        showStatus("Imported. Save rows manually.", 5000);
      };
      reader.readAsArrayBuffer(file);
    }

    async function handlePlanningUpload(event) {
      alert("WBS Upload initiated. Logic to parse and save to 'assemblies' table goes here.");
    }

    async function createProject() {
      const name = prompt("Enter Project Name:");
      if (!name) return;
      const id = prompt("Enter Project ID/Code:");
      if (!id) return;
      
      const { error } = await sb.from('projects').insert([{ id, project_code: id, name, division: 'DEFAULT', manager: 'SYSTEM', plan_status: 'New', labels: 'General', state: 'Active' }]);
      if (error) alert(error.message);
      else loadProjects();
    }
  </script>
</body>
</html>
