<style>

<script>
// --- Configuration ---
const SUPABASE_URL = "https://vidoqysothqtrgvkzouh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpZG9xeXNvdGhxdHJndmt6b3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MjEwMTksImV4cCI6MjA5MzA5NzAxOX0.-WSt4v067PAUqc3Z99wESocy5KExO5-mLg6DafjDD8s";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Current Context
let ctx = {
  projectId: '2533',
  taskId: '51',
  assemblyId: '1'
};

// Exact column headers from Excel
const EXCEL_COLS = [
  "Sr No", "Joblist", "Dwng No", "Quantity", "Material", "Wt", 
  "Assembly Name", "Vendor Name", "PO Number", "Unit Price", "Total Price", 
  "Release PO Status", "Release PO Date", "Ready Assembly Status", "Ready Assembly Date"
];

// AG Grid Setup
let gridApi;

const columnDefs = EXCEL_COLS.map(colName => {
  return {
    headerName: colName,
    field: colName,
    editable: true,
    width: 150
  };
});

const gridOptions = {
  columnDefs: columnDefs,
  defaultColDef: {
    resizable: true,
    sortable: true,
    filter: true
  },
  rowData: [],
  onCellValueChanged: (event) => saveRowDebounced(event.data),
  stopEditingWhenCellsLoseFocus: true,
  enableRangeSelection: true // Basic clipboard support
};

// Initialize Grid
document.addEventListener("DOMContentLoaded", () => {
  const gridDiv = document.querySelector('#myGrid');
  gridApi = agGrid.createGrid(gridDiv, gridOptions);
  
  // Attach custom paste handler
  gridDiv.addEventListener('paste', handleCustomPaste);

  // Load initial Data
  loadProjects();
});

function showProjects() {
  document.getElementById('screen-workspace').classList.remove('active');
  document.getElementById('screen-projects').classList.add('active');
}

function showWorkspace(projectId) {
  document.getElementById('screen-projects').classList.remove('active');
  document.getElementById('screen-workspace').classList.add('active');
  document.getElementById('input-project').value = projectId;
  ctx.projectId = projectId;
  
  loadTree(projectId);
}

// --- Left Panel Navigation ---
function showTaskManagement() {
  document.getElementById('assembly-tree').style.display = 'none';
  document.getElementById('flat-assembly-list').style.display = 'block';
  renderFlatAssemblies();
}

function showTreeManagement() {
  document.getElementById('assembly-tree').style.display = 'block';
  document.getElementById('flat-assembly-list').style.display = 'none';
}

async function loadTree(projectId) {
  const treeContainer = document.getElementById('assembly-tree');
  treeContainer.innerHTML = '<div style="padding:15px;color:#666;font-size:12px;">Loading tree...</div>';
  
  const { data, error } = await sb.from('assemblies')
    .select('*')
    .eq('project_id', projectId)
    .order('sort_order', { ascending: true });
    
  if (error || !data || data.length === 0) {
    treeContainer.innerHTML = '<div style="padding:15px;color:#666;font-size:12px;">No assemblies found. Upload Excel first.</div>';
    return;
  }

  let html = `<div class="node"><b>Project ${projectId}</b></div>`;
  
  let currentCat = null;
  let currentTaskId = '';

  data.forEach(a => {
    if (a.category && a.category !== currentCat) {
       html += `<div class="node level1">Category ${a.category}</div>`;
       currentCat = a.category;
    }
    
    const type = (a.type || '').toUpperCase();
    
    if (type === 'TASK') {
       currentTaskId = a.task_id || '';
       const phaseName = a.phase || 'Phase';
       html += `<div class="node level2">${phaseName}</div>`;
    } 
    else if (type === 'SUBTASK') {
       const taskText = currentTaskId ? ` (Task ${currentTaskId})` : '';
       html += `<div class="node level3" onclick="selectAssembly('${projectId}','${currentTaskId}','${a.internal_id}','${a.name}', this)">${a.name}${taskText}</div>`;
    }
    else if (type === 'STEP') {
       html += `<div class="node level4">${a.name}</div>`;
    }
  });

  treeContainer.innerHTML = html;
  
  // Select first assembly
  setTimeout(() => {
    const firstAssembly = document.querySelector('.level3');
    if(firstAssembly) firstAssembly.click();
  }, 100);
}

async function renderFlatAssemblies() {
  const flatList = document.getElementById('flat-assembly-list');
  flatList.innerHTML = '<div style="padding:15px;color:#666;font-size:12px;">Loading assemblies...</div>';
  
  const { data } = await sb.from('assemblies')
    .select('*')
    .eq('project_id', ctx.projectId)
    .order('sort_order');
    
  if(!data || data.length === 0) {
    flatList.innerHTML = '<div style="padding:15px;color:#666;font-size:12px;">No assemblies found.</div>';
    return;
  }
  
  let html = '';
  let currentTaskId = '';
  data.forEach(a => {
    const type = (a.type || '').toUpperCase();
    if (type === 'TASK') currentTaskId = a.task_id || '';
    if (type === 'SUBTASK') {
       html += `
         <div class="assembly-item" onclick="selectAssembly('${ctx.projectId}', '${currentTaskId}', '${a.internal_id}', '${a.name}', this)">
           <div class="assembly-name">${a.name}</div>
           <div class="assembly-meta">Category: ${a.category || ''} | Phase: ${a.phase || ''} | Task: ${currentTaskId}</div>
         </div>
       `;
    }
  });
  
  flatList.innerHTML = html;
}

// --- Projects Logic ---
async function loadProjects() {
  const { data, error } = await sb.from('projects').select('*').order('created_at', { ascending: false });
  if (error) {
    console.error("Error loading projects:", error);
    return;
  }
  renderProjects(data || []);
}

function getLabelClass(label) {
  const lower = (label || '').toLowerCase();
  if (lower.includes('ccl')) return 'ccl';
  if (lower.includes('rewi')) return 'rewi';
  if (lower.includes('cgl')) return 'cgl';
  if (lower.includes('apl')) return 'apl';
  if (lower.includes('pick')) return 'pick';
  if (lower.includes('6hi')) return 'six-hi';
  return 'default';
}

function getInitials(name) {
  if(!name) return '??';
  return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
}

function renderProjects(projects) {
  const tbody = document.getElementById('projects-tbody');
  
  if(projects.length === 0) {
    // Fallback dummy data matching user screenshot if table is empty
    projects = [
      { id: '2529', project_code: '2529', name: 'CCL 1500 MM @ 30 MPM', division: 'DEFAULT', manager: 'Saurabh Jangra', plan_status: 'Checked In', labels: 'CCL', state: 'In Process', start_date: '22-Jan-26', due_date: '30-Sep-25', proj_date: '22-Jun-27' },
      { id: 'N-2534', project_code: 'N - 2534', name: 'BMWIL - TRIMMING - 1500MM@500MPM', division: 'DEFAULT', manager: 'Kunal Dagar', plan_status: 'Checked In', labels: 'Rewi', state: 'In Process', start_date: '05-Feb-26', due_date: '31-Aug-25', proj_date: '24-Mar-27' },
      { id: 'N-2533', project_code: 'N - 2533', name: 'PICKLING LINE - 2000MM @ 130MPM', division: 'DEFAULT', manager: 'Aditya Saini', plan_status: 'Checked In', labels: 'Pick', state: 'In Process', start_date: '23-Jan-26', due_date: '30-Sep-25', proj_date: '18-Nov-26' }
    ];
  }

  let html = '';
  projects.forEach(p => {
    // Generate pill classes based on text
    const planPill = (p.plan_status || '').toLowerCase() === 'checked in' ? 'checked-in' : 'default';
    const statePill = (p.state || '').toLowerCase() === 'in process' ? 'in-process' : 'default';
    const labelPill = getLabelClass(p.labels);
    const avatarColor = '#' + Math.floor(Math.random()*16777215).toString(16).padEnd(6, '0');

    html += `
      <tr onclick="showWorkspace('${p.id}')">
        <td><span class="circle-indicator"></span> ${p.project_code || ''} - ${p.name || ''}</td>
        <td>${p.division || 'DEFAULT'}</td>
        <td><span class="manager-avatar" style="background:${avatarColor}">${getInitials(p.manager)}</span> ${p.manager || ''}</td>
        <td><span class="pill ${planPill}">${p.plan_status || ''}</span></td>
        <td><span class="pill ${labelPill}">${p.labels || ''}</span></td>
        <td><span class="pill ${statePill}">${p.state || ''} ></span></td>
        <td>${p.start_date || ''}</td>
        <td>${p.due_date || ''}</td>
        <td>${p.proj_date || ''}</td>
        <td style="color:#0d6efd; font-weight:bold; font-size:16px;">•••</td>
      </tr>
    `;
  });
  
  tbody.innerHTML = html;
}

function selectAssembly(projectId, taskId, assemblyId, name, element) {
  // Update UI
  document.querySelectorAll('.node, .assembly-item').forEach(el => el.classList.remove('active'));
  element.classList.add('active');
  document.getElementById('bom-title').innerText = `BOM View - ${name}`;
  
  document.getElementById('input-project').value = projectId;
  document.getElementById('input-task').value = taskId;
  document.getElementById('input-assembly').value = assemblyId;

  // Update Context
  ctx.projectId = projectId;
  ctx.taskId = taskId;
  ctx.assemblyId = assemblyId;

  loadBomData();
}

function showStatus(text, duration = 3000) {
  const el = document.getElementById('save-status');
  el.innerText = text;
  if (duration) {
    setTimeout(() => { if (el.innerText === text) el.innerText = ''; }, duration);
  }
}

// --- Data Operations ---

async function loadBomData() {
  showStatus("Loading...");
  gridApi.setGridOption('rowData', []);
  
  const { data, error } = await sb
    .from('bom_items')
    .select('*')
    .eq('project_id', ctx.projectId)
    .eq('assembly_task_id', ctx.taskId)
    .order('excel_row_index', { ascending: true });

  if (error) {
    console.error("Error loading BOM:", error);
    showStatus("Error loading data", 5000);
    return;
  }

  // Convert DB rows to Excel format for Grid
  const rowData = data.map(dbRow => {
    const gridRow = {
      _db_id: dbRow.id,
      _excel_row_index: dbRow.excel_row_index
    };
    EXCEL_COLS.forEach(colName => {
      gridRow[colName] = dbRow[colName] !== undefined ? dbRow[colName] : "";
    });
    return gridRow;
  });

  gridApi.setGridOption('rowData', rowData);
  showStatus("Loaded", 2000);
}

let saveTimeout;
function saveRowDebounced(row) {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveRow(row), 500);
}

async function saveRow(gridRow) {
  showStatus("Saving...");
  
  const dbRecord = {
    project_id: ctx.projectId,
    assembly_task_id: ctx.taskId,
    assembly_id: ctx.assemblyId,
    excel_row_index: gridRow._excel_row_index || 1
  };
  
  if (gridRow._db_id) {
    dbRecord.id = gridRow._db_id;
  }

  EXCEL_COLS.forEach(colName => {
    dbRecord[colName] = gridRow[colName] !== undefined ? gridRow[colName] : null;
  });

  // Upsert
  const { data, error } = await sb.from('bom_items').upsert([dbRecord]).select();
  
  if (error) {
    console.error("Error saving row:", error);
    showStatus("Save Failed", 5000);
  } else {
    // If it was a new row, save the returned ID
    if (!gridRow._db_id && data && data.length > 0) {
      gridRow._db_id = data[0].id;
    }
    showStatus("Saved ✓");
  }
}

// --- Upload Excel ---

function handleUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  showStatus("Parsing Excel...");
  const reader = new FileReader();
  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    const firstSheetName = workbook.SheetNames[0];
    const worksheet = workbook.Sheets[firstSheetName];
    
    // Parse using direct object keys as requested
    const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
    if (json.length === 0) return;

    if (!confirm("Overwrite existing BOM? This will replace all current data for this assembly.")) {
      showStatus("Upload cancelled", 2000);
      return;
    }

    const cols = Object.keys(json[0]);
    
    const dbRecords = [];
    const gridRows = [];
    
    let currentRowIndex = 1;
    json.forEach((rowData) => {
      const gridRow = { _excel_row_index: currentRowIndex };
      const dbRecord = {
        project_id: ctx.projectId,
        assembly_task_id: ctx.taskId,
        assembly_id: ctx.assemblyId,
        excel_row_index: currentRowIndex
      };

      cols.forEach(colName => {
        gridRow[colName] = rowData[colName];
        dbRecord[colName] = rowData[colName];
      });

      gridRows.push(gridRow);
      dbRecords.push(dbRecord);
      currentRowIndex++;
    });

    showStatus("Saving to DB...");
    
    // Clean replace
    await sb.from('bom_items').delete().eq('project_id', ctx.projectId).eq('assembly_task_id', ctx.taskId);

    // Insert new records
    // Batch insert
    const BATCH_SIZE = 100;
    for (let i = 0; i < dbRecords.length; i += BATCH_SIZE) {
      const batch = dbRecords.slice(i, i + BATCH_SIZE);
      await sb.from('bom_items').insert(batch);
    }

    gridApi.setGridOption('rowData', gridRows);
    showStatus("Upload Complete", 3000);
    
    // Reload to get DB IDs
    loadBomData();
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

// --- Download Excel ---

async function downloadExcel() {
  showStatus("Generating Excel...");
  
  const { data, error } = await sb
    .from('bom_items')
    .select('*')
    .eq('project_id', ctx.projectId)
    .eq('assembly_task_id', ctx.taskId)
    .order('excel_row_index', { ascending: true });

  if (error || !data || data.length === 0) {
    alert("No data to download");
    showStatus("");
    return;
  }

  // Create Header Rows (matching exact formatting)
  const headerRow1 = [
    "Sr No", "Joblist", "Dwng No", "Quantity", "Material", "Wt", 
    "Assembly Name", "Vendor Name", "PO Number", "Unit Price", "Total Price", 
    "Release of PO", "", "Ready for Assembly", ""
  ];
  const headerRow2 = [
    "", "", "", "", "", "", "", "", "", "", "", 
    "Status", "Date", "Status", "Date"
  ];

  const exportData = [headerRow1, headerRow2];

  data.forEach(dbRow => {
    const row = [];
    EXCEL_COLS.forEach(colName => {
      row.push(dbRow[colName] !== undefined ? dbRow[colName] : "");
    });
    exportData.push(row);
  });

  const ws = XLSX.utils.aoa_to_sheet(exportData);

  // Merges for header
  ws['!merges'] = [
    { s: { r: 0, c: 11 }, e: { r: 0, c: 12 } }, // Release of PO
    { s: { r: 0, c: 13 }, e: { r: 0, c: 14 } }  // Ready for Assembly
  ];

  const wb = XLSX.utils.book_new();
  const assemblyName = (data[0] && data[0].assembly_name) || 'HOLD DOWN ROLL ASSY';
  const safeSheetName = assemblyName.substring(0, 31).replace(/[\\/*?:\[\]]/g, '');
  XLSX.utils.book_append_sheet(wb, ws, safeSheetName);
  
  XLSX.writeFile(wb, `${assemblyName}_BOM.xlsx`);
  showStatus("Downloaded", 3000);
}

// --- Custom Paste (Ctrl+V) ---
function handleCustomPaste(e) {
  const clipboardData = e.clipboardData || window.clipboardData;
  const pastedText = clipboardData.getData('Text');
  if (!pastedText) return;
  e.preventDefault();

  const focusedCell = gridApi.getFocusedCell();
  if (!focusedCell) return;

  const startRowIndex = focusedCell.rowIndex;
  const startColId = focusedCell.column.getId();
  
  const columns = gridOptions.columnApi ? gridOptions.columnApi.getAllDisplayedColumns() : gridApi.getAllDisplayedColumns();
  const startColIndex = columns.findIndex(c => c.getColId() === startColId);

  const rows = pastedText.split(/\r?\n/);
  
  const rowNodes = [];
  gridApi.forEachNode((node) => { rowNodes.push(node); });

  rows.forEach((rowText, i) => {
    if (!rowText.trim() && i === rows.length - 1) return; // Skip last empty line
    const cells = rowText.split('\t');
    const targetRowIndex = startRowIndex + i;
    
    let rowNode = rowNodes[targetRowIndex];
    
    // If pasting beyond current rows, add new row
    if (!rowNode) {
      const newGridRow = {
        _excel_row_index: targetRowIndex + 1
      };
      const res = gridApi.applyTransaction({ add: [newGridRow] });
      rowNode = res.add[0];
      rowNodes.push(rowNode);
    }

    cells.forEach((cellText, j) => {
      const targetColIndex = startColIndex + j;
      if (targetColIndex < columns.length) {
        const colId = columns[targetColIndex].getColId();
        rowNode.setDataValue(colId, cellText.trim());
      }
    });
  });

  // Recalculate row indices after paste
  gridApi.forEachNode((node, index) => {
    node.data._excel_row_index = index + 1;
  });
}
